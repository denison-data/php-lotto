function brod_img(seq){
	var lurl = "./info/lotto.php";
	var form_data = {
		seq : seq,
		mode : "brod_select"
	};
	$.ajax({
		type	:	"POST",
		url		:	lurl,
		data : form_data,
		async: false,
		dataType : "json",
		cache: false,
		success : function(data){
			if(data['data'][seq]){
				if(data['data'][seq]['img']){
					$("#brod_img > img").attr({"src":data['data'][seq]['img']});
				} else {
					$("#brod_img > img").attr({"src":"http://image.mrlotto.co.kr/main_video.jpg"});
				}
				$("#brod_img > img").attr({"onclick":"window.open('"+data['data'][seq]['url']+"');","width":"341","height":"135"});
			}
		},
		error: function(request, status, error) {
			console.log("code:"+request.status+"\n"+"message:"+request.responseText+"\n"+"error:"+error);

		}
	});
	return false;
}

function setCookie(cookieName, value, exdays){
	var exdate = new Date();
	exdate.setDate(exdate.getDate() + exdays);
	var cookieValue = escape(value) + ((exdays==null) ? "" : "; expires=" + exdate.toGMTString());
	document.cookie = cookieName + "=" + cookieValue;
}
function deleteCookie(cookieName){
	var expireDate = new Date();
	expireDate.setDate(expireDate.getDate() - 1); //어제날짜를 쿠키 소멸날짜로 설정
	document.cookie = cookieName + "= " + "; expires=" + expireDate.toGMTString();
}
function getCookie(cookieName) {
	cookieName = cookieName + '=';
	var cookieData = document.cookie;
	var start = cookieData.indexOf(cookieName);
	var cookieValue = '';
	if(start != -1){
		start += cookieName.length;
		var end = cookieData.indexOf(';', start);
		if(end == -1)end = cookieData.length;
		cookieValue = cookieData.substring(start, end);
	}
	return unescape(cookieValue);
}
