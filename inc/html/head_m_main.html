function brod_img(seq){
	var lurl = "<?=$mobile_dir?>/info/lotto.php";
	var form_data = {
		seq : seq,
		mode : "brod_select"
	};
	$.ajax({
		type	:	"POST",
		url		:	lurl,
		data : form_data,
		async: false,
		dataType : "json",
		cache: false,
		success : function(data){
			if(data['data'][seq]){
				if(data['data'][seq]['img']){
					$("#brod_img > img").attr({"src":data['data'][seq]['img']});
				} else {
					$("#brod_img > img").attr({"src":"http://<?=$img_url?>/mobile/video.jpg"});
				}
				$("#brod_img > img").attr({"onclick":"window.open('"+data['data'][seq]['url']+"');","width":"100%"});
			}
		},
		error: function(request, status, error) {
			console.log("code:"+request.status+"\n"+"message:"+request.responseText+"\n"+"error:"+error);

		}
	});
	return false;
}
